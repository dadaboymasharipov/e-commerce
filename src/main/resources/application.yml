spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/app_ecommerce
    username: postgres
    password: 2003
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        enable_lazy_load_no_trans: true
  sql:
    init:
      mode: always
  servlet:
    multipart:
      max-file-size: 100MB

server:
  error:
    include-binding-errors: true